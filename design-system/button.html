<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; -webkit-font-smoothing: antialiased; padding: 32px; background: #f8f9fc; }
.section { margin-bottom: 28px; }
h2 { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8; margin-bottom: 14px; }
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; border-radius: 12px; border: none; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-md { padding: 9px 16px; font-size: 13px; }
.btn-lg { padding: 12px 24px; font-size: 13px; }
.primary { background: #6366f1; color: #fff; }
.secondary { background: #f1f3f8; color: #0f172a; border: 1px solid #e2e8f0; }
.ghost { background: transparent; color: #475569; }
.danger { background: #ef4444; color: #fff; }
.loading { background: #6366f1; color: rgba(255,255,255,.7); }
.icon { width: 14px; height: 14px; background: currentColor; border-radius: 2px; opacity: .8; }
.spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* dark section */
.dark-bg { background: #111118; border-radius: 16px; padding: 20px; }
.dark-bg h2 { color: #475569; }
.dark-bg .secondary { background: #16161f; color: #f1f5f9; border-color: #1e1e2d; }
.dark-bg .ghost { color: #94a3b8; }
.dark-bg .primary { background: #818cf8; }
.dark-bg .danger { background: #f87171; }
</style>
</head>
<body>
<div class="section">
  <h2>Variants</h2>
  <div class="row">
    <button class="btn btn-md primary">Add Expense</button>
    <button class="btn btn-md secondary">Cancel</button>
    <button class="btn btn-md ghost">View all</button>
    <button class="btn btn-md danger">Delete</button>
  </div>
</div>
<div class="section">
  <h2>Sizes</h2>
  <div class="row">
    <button class="btn btn-sm primary">Small</button>
    <button class="btn btn-md primary">Medium</button>
    <button class="btn btn-lg primary">Large</button>
  </div>
</div>
<div class="section">
  <h2>With Icon / Loading</h2>
  <div class="row">
    <button class="btn btn-md primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Income</button>
    <button class="btn btn-md secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
    <button class="btn btn-md loading"><div class="spinner"></div> Saving...</button>
    <button class="btn btn-md primary" style="opacity:.5;cursor:not-allowed">Disabled</button>
  </div>
</div>
<div class="dark-bg">
  <h2>Dark Mode</h2>
  <div class="row" style="margin-top:12px">
    <button class="btn btn-md primary">Add Expense</button>
    <button class="btn btn-md secondary">Cancel</button>
    <button class="btn btn-md ghost">View all</button>
    <button class="btn btn-md danger">Delete</button>
  </div>
</div>
</body>
</html>

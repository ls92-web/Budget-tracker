<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; -webkit-font-smoothing: antialiased; padding: 32px; background: #e2e8f0; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
.modal { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 4px 12px rgba(0,0,0,.08); width: 420px; overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid #e2e8f0; }
.modal-title { font-size: 14px; font-weight: 600; color: #0f172a; }
.close { width: 28px; height: 28px; border-radius: 8px; background: #f1f3f8; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
.modal-body { padding: 22px; }
.field { margin-bottom: 14px; }
label { display: block; font-size: 11px; font-weight: 500; color: #475569; margin-bottom: 6px; }
input, select { width: 100%; padding: 9px 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f1f3f8; font-size: 13px; color: #0f172a; outline: none; font-family: inherit; appearance: none; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-row { display: flex; gap: 8px; margin-top: 20px; }
.btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #f1f3f8; color: #0f172a; border: 1px solid #e2e8f0; }
.btn-save { background: #6366f1; color: #fff; }
/* dark modal */
.modal.dark { background: #111118; }
.modal.dark .modal-header { border-color: #1e1e2d; }
.modal.dark .modal-title { color: #f1f5f9; }
.modal.dark .close { background: #16161f; color: #475569; }
.modal.dark label { color: #94a3b8; }
.modal.dark input, .modal.dark select { background: #16161f; border-color: #1e1e2d; color: #f1f5f9; }
.modal.dark .btn-cancel { background: #16161f; color: #f1f5f9; border-color: #1e1e2d; }
.modal.dark .btn-save { background: #818cf8; }
/* confirm modal */
.confirm { width: 320px; }
.confirm .icon { width: 40px; height: 40px; border-radius: 12px; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.confirm p { font-size: 13px; color: #475569; line-height: 1.5; margin-bottom: 18px; }
.btn-danger { background: #ef4444; color: #fff; }
</style>
</head>
<body>
<!-- Add Expense Modal -->
<div class="modal">
  <div class="modal-header">
    <span class="modal-title">Add Expense</span>
    <button class="close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="modal-body">
    <div class="grid">
      <div class="field"><label>Amount</label><input placeholder="0.00" value="45.80"></div>
      <div class="field"><label>Date</label><input type="date" value="2026-06-14"></div>
    </div>
    <div class="field"><label>Merchant / Description</label><input value="Starbucks" placeholder="e.g. Starbucks, Amazon"></div>
    <div class="grid">
      <div class="field"><label>Category</label><select><option>Food & Dining</option></select></div>
      <div class="field"><label>Payment Method</label><select><option>Credit Card</option></select></div>
    </div>
    <div class="field"><label>Notes (optional)</label><input placeholder="Additional details..."></div>
    <div class="btn-row">
      <button class="btn btn-cancel">Cancel</button>
      <button class="btn btn-save">Add Expense</button>
    </div>
  </div>
</div>

<!-- Confirm / Delete Modal -->
<div class="modal confirm">
  <div class="modal-header">
    <span class="modal-title">Delete Entry</span>
    <button class="close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="modal-body">
    <div class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></div>
    <p>Are you sure you want to delete this expense? This action cannot be undone.</p>
    <div class="btn-row">
      <button class="btn btn-cancel">Cancel</button>
      <button class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<!-- Dark Modal -->
<div class="modal dark">
  <div class="modal-header">
    <span class="modal-title">Set Budget</span>
    <button class="close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="modal-body">
    <div class="field"><label>Category</label><select><option>Food & Dining</option></select></div>
    <div class="field"><label>Monthly Limit</label><input value="500.00"></div>
    <div class="field"><label>Alert Threshold (%)</label><input value="80"></div>
    <div class="btn-row">
      <button class="btn btn-cancel">Cancel</button>
      <button class="btn btn-save">Set Budget</button>
    </div>
  </div>
</div>
</body>
</html>
